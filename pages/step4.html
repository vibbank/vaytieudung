<!DOCTYPE html>
<html dir="ltr" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no, maximum-scale=2.0, user-scalable=yes, viewport-fit=cover"
    />
    <title>VIB - Đang xét duyệt hồ sơ - VAY TIÊU DÙNG TÍN CHẤP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
    
    <link rel="icon" href="https://sieuthiphanmem.net/wp-content/uploads/2026/03/logo-vib-dep.jpg" />

    <style>
      :root {
        --vib-blue: #0066b3;
        --vib-blue-dark: #004b87;
        --vib-blue-light: #e6f0f7;
        --vib-orange: #f37021;
        --vib-orange-light: #fef1e9;
        --success-color: #10b981;
        --success-bg: #d1fae5;
        --bg-page: #f0f4f8;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --text-light: #94a3b8;
        --radius-xl: 24px;
        --shadow-card: 0 20px 40px rgba(0, 40, 85, 0.12);
      }

      body { font-family: "Inter", sans-serif; background-color: var(--bg-page); color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

      .page-watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90vw; max-width: 800px; opacity: 0.03; pointer-events: none; z-index: -1; }

      .fe-topbar { width: 100%; background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 2px solid var(--vib-orange); }
      .fe-topbar-inner { max-width: 960px; margin: 0 auto; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
      
      .approval-page { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }
      .approval-card { width: 100%; max-width: 440px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border-radius: var(--radius-xl); box-shadow: var(--shadow-card); padding: 32px; text-align: center; }

      .personalization-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px dashed rgba(0, 102, 179, 0.2); }
      .app-id { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--vib-blue-dark); }
      .loan-amount { font-weight: 700; color: var(--vib-orange); }

      .radar-container { position: relative; width: 140px; height: 140px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
      .radar-wave { position: absolute; width: 100%; height: 100%; border: 2px solid var(--vib-blue); border-radius: 50%; opacity: 0; animation: radar-pulse 2s ease-out infinite; }
      @keyframes radar-pulse { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
      .radar-center { width: 80px; height: 80px; background: linear-gradient(135deg, var(--vib-blue) 0%, var(--vib-blue-dark) 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; z-index: 2; transition: all 0.4s ease; }
      
      .radar-container.is-complete .radar-wave { animation: none; opacity: 0; }
      .radar-container.is-complete .radar-center { background: linear-gradient(135deg, var(--success-color) 0%, #059669 100%); animation: success-bounce 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
      @keyframes success-bounce { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

      .status-title { font-size: 1.4rem; font-weight: 700; color: var(--vib-blue-dark); margin-bottom: 8px; transition: color 0.3s ease; }
      .system-logs-container { background: rgba(0, 0, 0, 0.03); border-radius: 8px; padding: 8px 12px; margin: 0 auto 16px; height: 60px; text-align: left; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; scroll-behavior: smooth; }
      .log-line { opacity: 0; animation: fadeInLog 0.3s forwards; white-space: nowrap; }
      @keyframes fadeInLog { to { opacity: 1; } }
      .ok { color: var(--success-color); font-weight: bold; }
      
      /* Tùy chỉnh thanh cuộn cho log */
      .system-logs-container::-webkit-scrollbar { width: 4px; }
      .system-logs-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
    </style>
  </head>

  <body>
    <img src="https://sieuthiphanmem.net/wp-content/uploads/2026/03/logo-vib-dep.jpg" class="page-watermark" alt="" />

    <header class="fe-topbar">
      <div class="fe-topbar-inner">
        <div class="fe-topbar-logo"><img src="https://sieuthiphanmem.net/wp-content/uploads/2026/03/logo-vib-dep.jpg" alt="VIB Logo" style="height:32px;"></div>
      </div>
    </header>

    <main class="approval-page">
      <div class="approval-card">
        <div class="personalization-info">
          <div>Hồ sơ: <span class="app-id" id="displayAppId">...</span></div>
          <div>Đề nghị: <span class="loan-amount" id="displayLoanAmount">...</span></div>
        </div>
        
        <div id="radarContainer" class="radar-container">
          <div class="radar-wave"></div>
          <div class="radar-wave"></div>
          <div class="radar-wave"></div>
          <div class="radar-center"><i id="centerIcon" class="fa-solid fa-server"></i></div>
        </div>
        
        <h1 id="statusTitle" class="status-title">Đang kết nối...</h1>
        <p id="statusMessage" class="status-message" aria-live="polite">Vui lòng chờ trong giây lát...</p>
        
        <div class="system-logs-container" id="systemLogs"></div>
        
        <button id="btnNext" class="btn btn-primary w-100" onclick="window.location.href='/pages/step5.html';" style="display: none; background-color: var(--vib-orange); color: #fff; border: none; border-radius: 8px; font-weight: 600; padding: 12px; margin-top: 8px;">
          Xác nhận <i class="fa-solid fa-arrow-right ms-2"></i>
        </button>
      </div>
    </main>

    <script>
      (function() {
        // 1. TẠO ÂM THANH "TING" (Web Audio API)
        function playSuccessSound() {
          try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, ctx.currentTime);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.5);
            osc.start(); osc.stop(ctx.currentTime + 0.5);
          } catch(e) { console.log("Audio API blocked"); }
        }

        // 2. TẠO HIỆU ỨNG RUNG ĐIỆN THOẠI
        function triggerHaptic() {
          if (navigator.vibrate) navigator.vibrate(200);
        }

        // 3. KHỔI TẠO DỮ LIỆU ĐỘNG (Lấy đúng năm hiện tại)
        const currentYear = new Date().getFullYear().toString().slice(-2);
        const randomId = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('displayAppId').textContent = `VIB-${currentYear}-${randomId}`;
        document.getElementById('displayLoanAmount').textContent = (localStorage.getItem('loanAmount') || '50,000,000') + ' VNĐ';

        // 4. KỊCH BẢN XETS DUYỆT CHI TIẾT
        const stages = [
          { title: 'Đang xét duyệt hồ sơ', message: 'Hệ thống đang mã hóa dữ liệu...', duration: 1500, icon: 'fa-solid fa-server', log: '> Connecting to VIB core... <span class="ok">[OK]</span>' },
          { title: 'Đang xét duyệt hồ sơ', message: 'Đang xác thực sinh trắc học...', duration: 1500, icon: 'fa-solid fa-id-card', log: '> Verifying eKYC data... <span class="ok">[OK]</span>' },
          { title: 'Đang xét duyệt hồ sơ', message: 'Đang truy vấn lịch sử CIC...', duration: 2000, icon: 'fa-solid fa-database', log: '> Fetching CIC records... <span class="ok">[OK]</span>' },
          { title: 'Đang xét duyệt hồ sơ', message: 'Chấm điểm tín dụng AI...', duration: 1500, icon: 'fa-solid fa-chart-line', log: '> Calculating credit score... <span class="ok">[OK]</span>' },
          { title: 'Xét duyệt thành công!', message: 'Hồ sơ của bạn đã được phê duyệt.', duration: 1000, icon: 'fa-solid fa-check', log: '> Approval granted. System ready.', isComplete: true }
        ];

        let currentStage = 0;
        const logContainer = document.getElementById('systemLogs');

        function addLogLine(htmlContent) {
          const line = document.createElement('div');
          line.className = 'log-line';
          line.innerHTML = htmlContent;
          logContainer.appendChild(line);
          logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateUI() {
          const stage = stages[currentStage];
          document.getElementById('centerIcon').className = stage.icon;
          document.getElementById('statusTitle').textContent = stage.title;
          document.getElementById('statusMessage').textContent = stage.message;
          addLogLine(stage.log);
          
          if (stage.isComplete) {
            document.getElementById('radarContainer').classList.add('is-complete');
            document.getElementById('statusTitle').style.color = 'var(--success-color)';
            
            // Kích hoạt đa giác quan
            playSuccessSound();
            triggerHaptic();

            // Hiển thị nút bấm sau 1 giây chờ (tạo cảm giác tự nhiên)
            setTimeout(() => {
              const btn = document.getElementById('btnNext');
              btn.style.display = 'block';
              btn.style.animation = 'success-bounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            }, 1000);
          }
        }

        function runSimulation() {
          setTimeout(function() {
            if (currentStage < stages.length - 1) {
              currentStage++;
              updateUI();
              runSimulation();
            }
          }, stages[currentStage].duration);
        }

        // Khởi động luồng chạy
        updateUI();
        runSimulation();
      })();
    </script>
  </body>
</html>
